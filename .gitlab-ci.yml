default:
  tags:
    - local

stages:
  - update
  - test
  - build
  - smoke

variables:
  NODE_VERSION: "22"

include:
  - project: 'coldforge/ci-templates'
    ref: main
    file: '/templates/frontend-smoke.yml'

# Auto-update @cloistr/ui when triggered from upstream
update-dependency:
  stage: update
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
  before_script:
    - apk add --no-cache git openssh-client
    - git config --global user.email "ci@coldforge.xyz"
    - git config --global user.name "GitLab CI"
  script:
    - echo "Updating ${UPSTREAM_PACKAGE}..."
    - npm update ${UPSTREAM_PACKAGE}
    - |
      if git diff --quiet package-lock.json; then
        echo "No changes to lockfile, already up to date"
      else
        echo "Lockfile updated, committing..."
        git add package-lock.json package.json
        git commit -m "chore: Update ${UPSTREAM_PACKAGE} [auto]"
        git push "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_COMMIT_REF_NAME}
      fi

# Test and type-check (skip when triggered from upstream)
test:
  stage: test
  image: node:${NODE_VERSION}-alpine
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
      when: never
    - when: always
  before_script:
    - npm ci
  script:
    - npm run build
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

# Build container image (skip when triggered from upstream)
build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  rules:
    - if: '$UPSTREAM_TRIGGER == "true"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
  before_script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"${CI_REGISTRY}\":{\"username\":\"${CI_REGISTRY_USER}\",\"password\":\"${CI_REGISTRY_PASSWORD}\"}}}" > /kaniko/.docker/config.json
  script:
    - /kaniko/executor --context ${CI_PROJECT_DIR} --dockerfile ${CI_PROJECT_DIR}/Dockerfile --destination ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA} --destination ${CI_REGISTRY_IMAGE}:latest

# Smoke-test: load built image in real Chromium, fail on console errors / blank page
smoke-test:
  extends: .smoke-test
  needs: ["build"]
